version: "3.8"

services:
    jenkins:
        build:
            context: .
            dockerfile: Dockerfile.jenkins
        container_name: jenkins_lab
        ports:
            - "8080:8080"
            - "50000:50000"
        volumes:
            - jenkins_home:/var/jenkins_home
        dns:
            - 8.8.8.8
            - 1.1.1.1

    ngrok:
        image: ngrok/ngrok:latest
        container_name: ngrok_lab
        depends_on:
            - jenkins
        env_file:
            - .env
        environment:
            - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
        command:
            - "http"
            - "jenkins:8080"
        ports:
            - "4040:4040"

volumes:
    jenkins_home:
